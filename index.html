<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <style>
    :root {
      color-scheme: only light;
      font-family: 'Poppins', sans-serif;
      background: #111;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      position: relative;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: url('images (4).jpg') center/cover no-repeat fixed;
      background-color: #05050f;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(5, 8, 15, 0.08), rgba(8, 13, 24, 0.14));
      pointer-events: none;
      opacity: 0.14;
      z-index: 0;
    }

    body::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(circle, rgba(255,255,255,0.02) 0%, transparent 18%);
      opacity: 0.08;
      z-index: 0;
    }

    .starfield {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      overflow: hidden;
    }

    .starfield .star {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.85);
      filter: blur(1.6px);
      opacity: 0.8;
      animation: fall 10s linear infinite;
    }

    .starfield .star:nth-child(1) { left: 6%; top: -5%; animation-delay: 0s; animation-duration: 9.6s; transform: scale(0.9); }
    .starfield .star:nth-child(2) { left: 20%; top: -12%; animation-delay: 1.2s; animation-duration: 10.8s; transform: scale(0.8); }
    .starfield .star:nth-child(3) { left: 34%; top: -8%; animation-delay: 2.4s; animation-duration: 11.2s; transform: scale(1); }
    .starfield .star:nth-child(4) { left: 48%; top: -10%; animation-delay: 0.8s; animation-duration: 9.8s; transform: scale(0.85); }
    .starfield .star:nth-child(5) { left: 62%; top: -6%; animation-delay: 1.6s; animation-duration: 10.4s; transform: scale(0.95); }
    .starfield .star:nth-child(6) { left: 76%; top: -14%; animation-delay: 2.8s; animation-duration: 10.1s; transform: scale(0.9); }
    .starfield .star:nth-child(7) { left: 10%; top: -18%; animation-delay: 3.4s; animation-duration: 11.5s; transform: scale(0.75); }
    .starfield .star:nth-child(8) { left: 40%; top: -16%; animation-delay: 4.2s; animation-duration: 10.6s; transform: scale(0.86); }
    .starfield .star:nth-child(9) { left: 58%; top: -11%; animation-delay: 5s; animation-duration: 9.9s; transform: scale(0.92); }
    .starfield .star:nth-child(10) { left: 82%; top: -9%; animation-delay: 6.1s; animation-duration: 10.3s; transform: scale(0.88); }

    @keyframes fall {
      0% {
        transform: translateY(0) scale(0.9);
        opacity: 0;
      }
      15% {
        opacity: 0.8;
      }
      85% {
        opacity: 0.8;
      }
      100% {
        transform: translateY(115vh) translateX(14px) scale(1.1);
        opacity: 0;
      }
    }

    .poster-wall {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    .poster {
      position: fixed;
      width: 240px;
      height: 340px;
      border-radius: 24px;
      overflow: hidden;
      background-size: cover;
      background-position: center;
      filter: blur(1.4px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.38);
      border: 1px solid rgba(255, 255, 255, 0.13);
      transform-style: preserve-3d;
    }

    .proposal-card audio {
      width: 100%;
      margin-top: 1.5rem;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.08);
      padding: 0.5rem 0;
    }

    .poster::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.1), transparent 45%, rgba(0,0,0,0.15));
      pointer-events: none;
    }

    .poster.p1 { top: 9%; left: 7%; transform: rotate(-7deg) scale(0.93); }
    .poster.p2 { top: 12%; right: 8%; transform: rotate(8deg) scale(0.92); }
    .poster.p3 { bottom: 16%; left: 12%; transform: rotate(5deg) scale(0.95); }

    .bg-audio {
      position: fixed;
      bottom: 24px;
      left: 24px;
      left: 24px;
      width: calc(100% - 48px);
      max-width: 380px;
      z-index: 10;
      background: rgba(10, 14, 22, 0.8);
      border-radius: 18px;
      padding: 12px 16px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
    }

    .proposal-card {
      max-width: 980px;
      width: min(95%, 980px);
      padding: 3rem;
      border-radius: 36px;
      background: rgba(7, 10, 16, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 38px 120px rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(18px);
      position: relative;
      overflow: hidden;
      animation: cardPop 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      transform: translateY(22px) scale(0.92);
      z-index: 2;
      background-clip: padding-box;
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(7,10,16,0.24);
      z-index: 8;
      gap: 1rem;
      pointer-events: auto;
      animation: overlayFloat 6s ease-in-out infinite;
    }

    .play-overlay.hidden {
      display: none;
    }

    .play-overlay .play-btn {
      position: relative;
      padding: 0.9rem 1.6rem;
      border-radius: 999px;
      background: linear-gradient(135deg,#ff6fd8,#9d8cff);
      color: #fff;
      font-weight: 700;
      border: none;
      cursor: pointer;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
      z-index: 2;
      overflow: visible;
      transform: translateZ(0);
    }

    .play-overlay .play-btn::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 160%;
      height: 160%;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, rgba(255,111,216,0.22), rgba(157,140,255,0.14));
      filter: blur(14px);
      opacity: 0.9;
      z-index: 1;
      animation: pulseRing 2.8s ease-in-out infinite;
      pointer-events: none;
    }

    .play-overlay .play-btn::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) rotate(0deg);
      width: 220%;
      height: 220%;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.06);
      background: conic-gradient(from 0deg, rgba(255,111,216,0.18), rgba(157,140,255,0.12), rgba(87,243,255,0.12), rgba(255,111,216,0.18));
      filter: blur(6px);
      z-index: 0;
      animation: spinBorder 6s linear infinite;
      pointer-events: none;
      opacity: 0.95;
      mix-blend-mode: screen;
    }

    @keyframes pulseRing {
      0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.6; }
      50% { transform: translate(-50%, -50%) scale(1.05); opacity: 0.9; }
      100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.6; }
    }

    @keyframes spinBorder {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    @keyframes overlayFloat {
      0% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0); }
    }

    .audio-box {
      margin-top: 1.25rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .audio-label {
      font-size: 0.96rem;
      color: rgba(255, 255, 255, 0.78);
      font-weight: 600;
      letter-spacing: 0.08em;
    }

    .cd-player {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cd-disc {
      position: absolute;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: url('cd sharmeeli.jpg') center/cover no-repeat,
                  radial-gradient(circle at 35% 35%, #1a1a1a 0%, #050505 70%, #000 100%);
      box-shadow: 
        0 0 0 2px rgba(100, 100, 100, 0.3),
        0 0 0 4px rgba(80, 80, 80, 0.2),
        0 0 0 6px rgba(60, 60, 60, 0.15),
        0 0 0 8px rgba(40, 40, 40, 0.1),
        inset 0 -2px 12px rgba(0, 0, 0, 0.8),
        inset 0 2px 8px rgba(255, 255, 255, 0.08),
        0 20px 60px rgba(0, 0, 0, 0.6);
      animation: spinCD 4s linear infinite;
    }

    .cd-disc.paused {
      animation-play-state: paused;
    }

    .cd-disc::before {
      content: '';
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #ffd700, #daa520);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 
        inset 0 -2px 4px rgba(0, 0, 0, 0.8),
        inset 0 1px 2px rgba(255, 255, 255, 0.4),
        0 6px 16px rgba(0, 0, 0, 0.7);
      z-index: 2;
    }

    .cd-disc::after {
      content: '';
      position: absolute;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: repeating-conic-gradient(
        from 0deg,
        rgba(255, 255, 255, 0.08) 0deg 2deg,
        rgba(100, 150, 200, 0.06) 2deg 4deg,
        rgba(255, 255, 255, 0.04) 4deg 6deg
      );
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.4);
    }

    @keyframes spinCD {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .cd-controls {
      position: absolute;
      bottom: -40px;
      display: flex;
      gap: 1rem;
      z-index: 3;
    }

    .cd-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255, 111, 216, 0.9), rgba(157, 140, 255, 0.9));
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      box-shadow: 0 8px 24px rgba(255, 62, 196, 0.3);
    }

    .cd-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 12px 32px rgba(255, 62, 196, 0.4);
    }

    .cd-btn:active {
      transform: scale(0.95);
    }

    .proposal-card:hover {
      transform: translateY(0) scale(1);
      box-shadow: 0 42px 128px rgba(0, 0, 0, 0.18);
    }

    .proposal-card::before {
      content: '';
      position: absolute;
      inset: 0;
      margin: -1px;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255, 0, 230, 0.14), rgba(0, 255, 255, 0.1));
      opacity: 0.08;
      pointer-events: none;
      filter: blur(8px);
    }

    @keyframes cardPop {
      0% {
        transform: translateY(30px) scale(0.88);
        opacity: 0;
      }
      45% {
        transform: translateY(-8px) scale(1.06);
        opacity: 1;
      }
      70% {
        transform: translateY(4px) scale(0.99);
        opacity: 1;
      }
      100% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
    }

    .proposal-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.2);
      pointer-events: none;
    }

    .proposal-card h1 {
      font-size: clamp(2.8rem, 4vw, 5rem);
      letter-spacing: -0.04em;
      margin-bottom: 0.8rem;
      line-height: 1.02;
      text-transform: none;
      font-weight: 800;
      background: linear-gradient(120deg, #ff6fd8, #9d8cff, #57f3ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      position: relative;
      z-index: 1;
    }

    .proposal-card p {
      font-size: 1.05rem;
      max-width: 720px;
      margin: 0 auto 2rem;
      line-height: 1.85;
      color: rgba(238, 244, 255, 0.92);
      position: relative;
      z-index: 1;
    }

    .proposal-card .highlight {
      color: #ff93d8;
      font-weight: 700;
    }

    .proposal-card .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      background: linear-gradient(135deg, rgba(255, 62, 196, 0.95), rgba(122, 101, 255, 0.95));
      color: #fff;
      padding: 1rem 1.8rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      cursor: pointer;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      box-shadow: 0 18px 48px rgba(255, 62, 196, 0.35);
      transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    .proposal-card .cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.25), transparent 36%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .proposal-card .cta:hover::before {
      opacity: 1;
    }

    .proposal-card .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 24px 48px rgba(255, 62, 196, 0.38);
    }

    .proposal-card .cta span {
      display: inline-block;
      animation: pulse 1.8s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .sparkles {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .sparkle {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0));
      filter: blur(0.8px);
      animation: float 10s infinite ease-in-out;
      opacity: 0.75;
    }

    .proposal-card:hover .sparkle {
      animation-duration: 7s;
      opacity: 1;
    }

    .sparkle:nth-child(1) { top: 12%; left: 8%; animation-duration: 11s; animation-delay: 0s; }
    .sparkle:nth-child(2) { top: 16%; right: 14%; animation-duration: 8s; animation-delay: 1.4s; }
    .sparkle:nth-child(3) { bottom: 18%; left: 12%; animation-duration: 9.5s; animation-delay: 0.6s; }
    .sparkle:nth-child(4) { bottom: 12%; right: 18%; animation-duration: 7.2s; animation-delay: 2.1s; }
    .sparkle:nth-child(5) { top: 48%; left: 48%; animation-duration: 12s; animation-delay: 1.8s; }
    .sparkle:nth-child(6) { top: 32%; right: 30%; animation-duration: 14s; animation-delay: 0.4s; }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); opacity: 0.8; }
      50% { transform: translate(6px, -18px) scale(1.2); opacity: 1; }
      100% { transform: translate(0, 0) scale(1); opacity: 0.8; }
    }

    .subtitle {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 2rem;
      color: #f4edff;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.85;
      font-size: 0.95rem;
    }

    .subtitle::before,
    .subtitle::after {
      content: '❥';
      opacity: 0.6;
    }

    .love-line {
      font-size: 1rem;
      color: #c9d0ff;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    @media (max-width: 640px) {
      .proposal-card {
        padding: 2rem;
      }

      .proposal-card h1 {
        font-size: 2.7rem;
      }
    }
    
    /* Cover-on-load then return-with-spin animations for posters */
    .poster.cover {
      z-index: 60;
      animation: posterCover 700ms cubic-bezier(.2,.9,.2,1) forwards;
    }
    .poster.cover.p1 { animation-delay: 0s; }
    .poster.cover.p2 { animation-delay: 0.06s; }
    .poster.cover.p3 { animation-delay: 0.12s; }

    @keyframes posterCover {
      from {
        /* start from computed box (browser interpolates) */
      }
      to {
        /* center the element and scale it up instead of resizing abruptly */
        top: 50% !important;
        left: 50% !important;
        transform: translate(-50%, -50%) scale(6) rotate(0deg) !important;
        border-radius: 0 !important;
        filter: none !important;
        box-shadow: none !important;
      }
    }

    /* Return animations: each poster spins while returning to its original place */
    .poster.return { z-index: 4; }

    .poster.return.p1 { animation: posterReturnP1 1000ms cubic-bezier(.22,.9,.28,1) forwards; animation-delay: 120ms; }
    .poster.return.p2 { animation: posterReturnP2 1000ms cubic-bezier(.22,.9,.28,1) forwards; animation-delay: 160ms; }
    .poster.return.p3 { animation: posterReturnP3 1000ms cubic-bezier(.22,.9,.28,1) forwards; animation-delay: 200ms; }

    @keyframes posterReturnP1 {
      0% {
        top: 50%; left: 50%; transform: translate(-50%, -50%) scale(6) rotate(0deg); border-radius: 0;
      }
      60% {
        transform: translate(-50%, -50%) rotate(360deg) scale(1.06);
      }
      100% {
        top: 9%; left: 7%; transform: rotate(-7deg) scale(0.93); border-radius: 24px;
      }
    }

    @keyframes posterReturnP2 {
      0% {
        top: 50%; left: 50%; transform: translate(-50%, -50%) scale(6) rotate(0deg); border-radius: 0;
      }
      60% {
        transform: translate(-50%, -50%) rotate(-360deg) scale(1.06);
      }
      100% {
        top: 12%; right: 8%; left: auto; transform: rotate(8deg) scale(0.92); border-radius: 24px;
      }
    }

    @keyframes posterReturnP3 {
      0% {
        top: 50%; left: 50%; transform: translate(-50%, -50%) scale(6) rotate(0deg); border-radius: 0;
      }
      60% {
        transform: translate(-50%, -50%) rotate(420deg) scale(1.06);
      }
      100% {
        bottom: 16%; top: auto; left: 12%; transform: rotate(5deg) scale(0.95); border-radius: 24px;
      }
    }
    /* Mini-game styles */
    .game-modal {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(6,8,12,0.6);
      z-index: 120;
      backdrop-filter: blur(6px);
      pointer-events: auto;
    }
    .game-modal.hidden { display: none; }
    .game-board {
      width: min(92%, 820px);
      height: min(76vh, 720px);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 40px 120px rgba(0,0,0,0.6);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .game-hud {
      display:flex; align-items:center; gap:1rem; padding:12px 16px; z-index:5;
    }
    .game-timer { font-weight:800; font-size:1.6rem; color:#ffd1e9; }
    .game-score { margin-left:auto; color:#fff; opacity:0.95; }
    .game-close { margin-left:8px; background:transparent; border:none; color:#fff; font-size:1.1rem; cursor:pointer; }
    .game-area { position:relative; flex:1; overflow:hidden; cursor:crosshair; }
    .game-footer { padding:12px 16px; display:flex; justify-content:center; gap:12px; }
    .cta.small { padding:0.6rem 1rem; font-size:0.95rem; border-radius:12px; }

    .panda {
      position:absolute;
      width:72px; height:72px;
      cursor:crosshair;
      user-select:none;
      animation: pandaJump 1.1s cubic-bezier(.45,.03,.52,.96) forwards;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.25));
      transition: transform 180ms ease;
    }
    .panda:hover {
      transform: scale(1.08);
    }
    .panda-face {
      position:absolute;
      inset:0;
      background:#fff;
      border:5px solid #000;
      border-radius:50%;
      box-sizing:border-box;
      overflow:hidden;
    }
    .panda-ear {
      position:absolute;
      width:20px;
      height:20px;
      background:#000;
      border-radius:50%;
      top:-6px;
      box-shadow: inset -2px -2px 0 rgba(255,255,255,0.3);
    }
    .panda-ear.left { left:10px; }
    .panda-ear.right { right:10px; }
    .panda-eye {
      position:absolute;
      width:18px;
      height:24px;
      background:#000;
      border-radius:50%;
      top:20px;
      border:2px solid rgba(255,255,255,0.65);
    }
    .panda-eye.left { left:16px; }
    .panda-eye.right { right:16px; }
    .panda-eye::before {
      content:'';
      position:absolute;
      top:4px;
      left:4px;
      width:6px;
      height:6px;
      background:#fff;
      border-radius:50%;
      opacity:0.9;
    }
    .panda-blush {
      position:absolute;
      width:14px;
      height:8px;
      background:rgba(255,105,180,0.35);
      border-radius:999px;
      bottom:16px;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.15);
    }
    .panda-blush.left { left:14px; }
    .panda-blush.right { right:14px; }
    .panda-glasses {
      position:absolute;
      top:28px;
      left:50%;
      width:44px;
      height:16px;
      transform:translateX(-50%);
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    .panda-glasses span {
      width:16px;
      height:16px;
      border:3px solid #000;
      border-radius:50%;
      background:rgba(0,0,0,0.18);
      box-sizing:border-box;
    }
    .panda-glasses::before {
      content:'';
      position:absolute;
      left:18px;
      top:6px;
      width:8px;
      height:3px;
      background:#000;
      border-radius:2px;
    }
    .panda-mouth {
      position:absolute;
      width:14px;
      height:10px;
      border-radius: 0 0 14px 14px;
      left:50%;
      bottom:14px;
      transform:translateX(-50%);
      background:linear-gradient(180deg, #000, #2e2e2e);
    }
    @keyframes pandaJump {
      0% { transform: scale(0) translateY(0); opacity:0; }
      20% { opacity:1; }
      50% { transform: scale(1.02) translateY(-80px) rotate(-2deg); }
      80% { transform: scale(1) translateY(8px) rotate(2deg); }
      100% { transform: scale(1) translateY(0); opacity:1; }
    }
    .panda.caught { animation: pandaCaught 400ms ease-out forwards; }
    @keyframes pandaCaught { to { transform: scale(0) rotate(30deg); opacity:0; } }
    .game-end-message {
      position:absolute;
      left:50%;
      bottom:100px;
      transform: translateX(-50%) translateY(16px);
      width:min(88%, 560px);
      padding:1rem 1.25rem;
      border-radius:18px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(14px);
      color:#fff;
      font-size:1rem;
      line-height:1.5;
      text-align:center;
      border:1px solid rgba(255,255,255,0.18);
      box-shadow: 0 22px 60px rgba(0,0,0,0.25);
      opacity:0;
      pointer-events:none;
      transition: opacity 260ms ease, transform 260ms ease;
    }
    .game-end-message.visible {
      opacity:1;
      transform: translateX(-50%) translateY(0);
      pointer-events:auto;
    }
    
    .heart {
      position:absolute;
      width:48px; height:48px; border-radius:50%;
      background: radial-gradient(circle at 30% 25%, #ff8db7, #ff4d87);
      display:flex; align-items:center; justify-content:center; color:#fff; font-size:24px; cursor:default;
      transform: scale(0) rotate(0deg);
      animation: heartFall 2s ease-in forwards;
      user-select:none;
      box-shadow: 0 8px 20px rgba(255,77,135,0.25);
    }
    @keyframes heartFall {
      0% { transform: scale(1) translateY(-40px) rotate(0deg); opacity:1; }
      100% { transform: scale(0.8) translateY(60px) rotate(360deg); opacity:0; }
    }

  </style>
</head>
<body>
  <div class="starfield">
    <span class="star"></span>
    <span class="star"></span>
    <span class="star"></span>
    <span class="star"></span>
    <span class="star"></span>
    <span class="star"></span>
    <span class="star"></span>
    <span class="star"></span>
    <span class="star"></span>
    <span class="star"></span>
  </div>
  <!-- Mini-game modal: click hearts to score -->
  <div class="game-modal hidden" id="game-modal" aria-hidden="true">
    <div class="game-board" id="game-board" role="application" aria-label="Mini game">
      <div class="game-hud">
        <div class="game-timer" id="game-timer">15</div>
        <div class="game-score">Score: <span id="game-score">0</span></div>
        <button class="game-close" id="game-close">✕</button>
      </div>
      <div class="game-area" id="game-area"></div>
      <div class="game-end-message hidden" id="game-end-message" aria-live="polite"></div>
      <div class="game-footer">
        <button id="game-replay" class="cta small">Play again</button>
      </div>
    </div>
  </div>
  <div class="poster-wall">
    <div class="poster p1" style="background-image:url('images.jpg');"></div>
    <div class="poster p2" style="background-image:url('images (1).jpg');"></div>
    <div class="poster p3" style="background-image:url('images (2).jpg');"></div>
  </div>
  <div class="proposal-card">
    <div class="sparkles">
      <span class="sparkle"></span>
      <span class="sparkle"></span>
      <span class="sparkle"></span>
      <span class="sparkle"></span>
      <span class="sparkle"></span>
      <span class="sparkle"></span>
    </div>
    <div class="subtitle">A lil moment for us</div>
    <h1>Soft. Sweet. Simple.</h1>
    <p>
      Just a tiny note that feels like us — warm, easy, and a little sparkly. If you like it too, let’s keep this moment going.
    </p>
    <div class="love-line">just a soft yes if it fits.</div>
    <div class="audio-box">
      <div class="audio-label">Song for You(full audio ni mila)</div>
      <div class="cd-player">
        <div class="cd-disc" id="cd-disc"></div>
      </div>
      <audio id="song-player" preload="auto" playsinline style="display: none;">
        <source src="SHARMEELI-Downringtone.com.mp3" type="audio/mpeg" />
        Your browser does not support audio playback.
      </audio>
    </div>

    <button class="cta" type="button">
      <span>Send the love</span>
    </button>
  </div>
  <script>
    (function() {
      const audio = document.getElementById('song-player');
      const cdDisc = document.getElementById('cd-disc');

      function updateDiscState() {
        if (audio.paused) {
          cdDisc.classList.add('paused');
        } else {
          cdDisc.classList.remove('paused');
        }
      }

      function startAudio() {
        if (!audio) return;
        audio.volume = 0.9;
        audio.play().catch(() => {
          // Browsers may still block autoplay until the first tap/click.
        });
      }

      // Update disc state when audio plays/pauses
      audio.addEventListener('play', updateDiscState);
      audio.addEventListener('pause', updateDiscState);

      // Try to start playback automatically when the page loads.
      startAudio();
      updateDiscState();

      // If autoplay is blocked, start on the first user interaction.
      const startOnInteraction = () => {
        startAudio();
        updateDiscState();
        document.removeEventListener('click', startOnInteraction);
        document.removeEventListener('touchstart', startOnInteraction);
      };

      document.addEventListener('click', startOnInteraction, { once: true });
      document.addEventListener('touchstart', startOnInteraction, { once: true });

        // Posters animation: cover then return with spin
        const posters = document.querySelectorAll('.poster');
        function triggerPostersCoverAndReturn() {
          if (!posters || posters.length === 0) return;
          posters.forEach((p) => p.classList.remove('return'));
          // start the cover animation (staggered via CSS)
          posters.forEach((p) => p.classList.add('cover'));

          // After cover finishes, remove cover and add return to spin back
          // cover duration ~700ms + max stagger ~120ms → wait a bit longer
          const wait = 950;
          setTimeout(() => {
            posters.forEach((p) => p.classList.remove('cover'));
            // force reflow so the return animation always triggers
            void document.body.offsetWidth;
            posters.forEach((p) => p.classList.add('return'));
          }, wait);
        }

        if (document.readyState === 'complete') {
          setTimeout(triggerPostersCoverAndReturn, 240);
        } else {
          window.addEventListener('load', () => setTimeout(triggerPostersCoverAndReturn, 240));
        }

      })();
    
      // Mini-game logic
      (function(){
        const modal = document.getElementById('game-modal');
        const area = document.getElementById('game-area');
        const timerEl = document.getElementById('game-timer');
        const scoreEl = document.getElementById('game-score');
        const endMessageEl = document.getElementById('game-end-message');
        const closeBtn = document.getElementById('game-close');
        const replayBtn = document.getElementById('game-replay');
        const ctaBtn = document.querySelector('.proposal-card .cta');

        let score = 0;
        let timeLeft = 15;
        let spawnInterval = null;
        let countdownInterval = null;

        function openGame() {
          if (!modal) return;
          modal.classList.remove('hidden');
          modal.setAttribute('aria-hidden', 'false');
          startGame();
        }

        function closeGame() {
          if (!modal) return;
          modal.classList.add('hidden');
          modal.setAttribute('aria-hidden', 'true');
          stopGame();
          clearArea();
          if (endMessageEl) {
            endMessageEl.classList.add('hidden');
            endMessageEl.classList.remove('visible');
          }
        }

        function clearArea(){
          if (!area) return;
          area.innerHTML = '';
        }

        function startGame(){
          score = 0; timeLeft = 15; updateHUD(); clearArea();
          if (endMessageEl) {
            endMessageEl.textContent = '';
            endMessageEl.classList.add('hidden');
            endMessageEl.classList.remove('visible');
          }
          // spawn pandas every 700ms
          spawnInterval = setInterval(spawnPanda, 700);
          countdownInterval = setInterval(()=>{
            timeLeft -= 1; updateHUD();
            if (timeLeft <= 0) endGame();
          }, 1000);
          // initial burst
          for (let i=0;i<2;i++) setTimeout(spawnPanda, i*250);
        }

        function stopGame(){
          clearInterval(spawnInterval); spawnInterval = null;
          clearInterval(countdownInterval); countdownInterval = null;
        }

        function endGame(){
          stopGame();
          if (endMessageEl) {
            const confession = score >= 8
              ? 'Hope the power of my love for u ignites your love for me. I need to confess: I reallllly likke uuu.'
              : 'That was so sweet. Here’s a little confession: I adore you, and this moment means a lot to me.';
            endMessageEl.textContent = `Game over my love! Score: ${83}. ${confession}`;
            endMessageEl.classList.remove('hidden');
            endMessageEl.classList.add('visible');
          }
        }

        function updateHUD(){ if (timerEl) timerEl.textContent = String(timeLeft); if (scoreEl) scoreEl.textContent = String(score); }

        function spawnPanda(){
          if (!area) return;
          const m = document.createElement('div');
          m.className = 'panda';
          m.innerHTML = `
            <div class="panda-face"></div>
            <div class="panda-ear left"></div>
            <div class="panda-ear right"></div>
            <div class="panda-eye left"></div>
            <div class="panda-eye right"></div>
            <div class="panda-blush left"></div>
            <div class="panda-blush right"></div>
            <div class="panda-glasses"><span></span><span></span></div>
            <div class="panda-mouth"></div>
          `;
          const pad = 16;
          const size = 72 + Math.floor(Math.random() * 12);
          const w = area.clientWidth - pad*2 - size;
          const hgt = area.clientHeight - pad*2 - size;
          const x = Math.max(8, Math.floor(Math.random()*w));
          const y = Math.max(8, Math.floor(Math.random()*hgt));
          m.style.left = x + 'px';
          m.style.top = y + 'px';
          m.style.width = size + 'px';
          m.style.height = size + 'px';
          area.appendChild(m);

          // remove after 4s if not caught
          const removeTimeout = setTimeout(()=>{ if (m.parentNode) m.remove(); }, 4000);

          m.addEventListener('click', function(e){
            e.stopPropagation();
            clearTimeout(removeTimeout);
            // Catch the panda!
            m.classList.add('caught');
            score += 2;
            updateHUD();

            // Spawn 2-3 hearts falling from this panda
            const heartCount = Math.random() > 0.5 ? 4 : 3;
            for (let i=0; i<heartCount; i++) {
              setTimeout(() => spawnHeartFromPanda(x + size/2, y + size/2), i*120);
            }

            setTimeout(()=>{ if (m.parentNode) m.remove(); }, 400);
          });
        }

        function spawnHeartFromPanda(startX, startY){
          if (!area) return;
          const h = document.createElement('div');
          h.className = 'heart';
          h.innerHTML = '❤';
          h.style.left = startX + 'px';
          h.style.top = startY + 'px';
          area.appendChild(h);
          
          setTimeout(()=>{ if (h.parentNode) h.remove(); }, 2000);
        }

        // wire buttons
        if (ctaBtn) ctaBtn.addEventListener('click', (e)=>{
          e.preventDefault();
          openGame();
        });
        if (closeBtn) closeBtn.addEventListener('click', ()=> closeGame());
        if (replayBtn) replayBtn.addEventListener('click', ()=>{ stopGame(); startGame(); });

      })();
  </script>
</body>
</html>
